<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBS Global - Admin Login</title>
    <style>
        :root {
            --primary: #1a237e;
            --accent: #ffca28;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a237e 0%, #3949ab 100%);
            overflow-x: hidden;
        }

        /* Modern Login Card */
        #loginOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: inherit;
            z-index: 1000;
        }

        .login-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            width: 350px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card img {
            width: 100px;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .login-card h2 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 22px;
            font-weight: 700;
        }

        .login-card p {
            color: #666;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(26, 35, 126, 0.2);
        }

        .login-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(26, 35, 126, 0.3);
        }

        .login-btn:hover {
            background: #0d125a;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 35, 126, 0.4);
        }

        /* Hide main app initially */
        .main-app { display: none; width: 95%; max-width: 850px; margin: 20px auto; }
        
        /* Rest of the old CSS styles continue here... */
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border: 1px solid #eee; }
        th { background: #f8f9fa; text-align: left; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--primary); }
        @media print { #loginOverlay, .search-section, .btn-group, .dashboard { display: none !important; } }
    </style>
</head>
<body onload="checkAutoLogin()">

<div id="loginOverlay">
    <div class="login-card">
        <img src="logo.png" alt="School Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2602/2602414.png'">
        <h2>RBS GLOBAL</h2>
        <p>Management Portal Access</p>
        
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Enter Admin Password">
        </div>
        
        <button class="login-btn" onclick="checkLogin()">Login Securely</button>
        
        <div style="margin-top: 20px; font-size: 11px; color: #999;">
            © 2026 RBS Global Public School
        </div>
    </div>
</div>

<div class="main-app" id="app">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
             <h3 style="color:var(--primary); margin:0;">Book Billing System</h3>
             <button onclick="logout()" style="background:#eee; border:none; padding:5px 10px; cursor:pointer; border-radius:5px;">Logout</button>
        </div>
        
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="searchInput" placeholder="Search Name or Receipt...">
            <button onclick="performSearch()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Search</button>
        </div>

        <form id="bookForm">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
                <span>Receipt: <span id="receiptNoDisplay" style="color:red"></span></span>
                <span>Date: <input type="date" id="currDate" name="date" style="width:130px; border:none"></span>
            </div>
            <table>
                <tr><th>Student Name</th><td><input type="text" name="name" id="stuName" required></td></tr>
                <tr>
                    <th>Class</th>
                    <td>
                        <select name="class" id="classSelect" onchange="updatePriceByClass()">
                            <option value="">-- Select Class --</option>
                            <option value="Nursery/LKG/UKG">Nursery/LKG/UKG</option>
                            <option value="Class 1 to 5">Class 1 to 5</option>
                            <option value="Class 6 to 8">Class 6 to 8</option>
                            <option value="Class 9 & 10">Class 9 & 10</option>
                            <option value="Other">Other</option>
                        </select>
                    </td>
                </tr>
                <tr><th>Total Price (₹)</th><td><input type="number" name="amount" id="amt" oninput="doCalc()"></td></tr>
                <tr><th>Discount (₹)</th><td><input type="number" name="discount" id="disc" value="0" oninput="doCalc()"></td></tr>
                <tr>
                    <th>Payment</th>
                    <td style="display:flex; gap:5px; border:none">
                        <input type="number" name="cash" id="cash" placeholder="Cash" oninput="doCalc()">
                        <input type="number" name="online" id="online" placeholder="Online" oninput="doCalc()">
                    </td>
                </tr>
                <tr style="background:#f1f3f4">
                    <th><strong>Net Total</strong></th>
                    <td><input type="number" name="net" id="net" readonly style="font-weight:bold; color:var(--primary)"></td>
                </tr>
            </table>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button type="submit" id="saveBtn" style="flex:1; padding:15px; background:green; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Save Receipt</button>
                <button type="button" onclick="window.print()" style="flex:1; padding:15px; background:#0277bd; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Print Invoice</button>
            </div>
        </form>

        <div class="dashboard">
            <div class="stat-card"><h4>Cash</h4><p id="dashCash">₹0</p></div>
            <div class="stat-card"><h4>Online</h4><p id="dashOnline">₹0</p></div>
            <div class="stat-card"><h4>Disc.</h4><p id="dashDisc">₹0</p></div>
            <div class="stat-card"><h4>Total</h4><p id="dashTotal" style="color:green">₹0</p></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlIM_P94eRYwA1EJO9ImkjKbb5QnTVMxEvuZGXmmmRkRZQSI9g6S_0CASnyEQ-X86Z/exec';
    let serial = localStorage.getItem('rbs_serial') || 1001;

    // Login logic with updated UI handling
    function checkLogin() {
        const pass = document.getElementById('passInput').value;
        if(pass === "RBS@2026") {
            sessionStorage.setItem('isLoggedIn', 'true');
            showApp();
        } else {
            alert("❌ Incorrect Password. Access Denied!");
        }
    }

    function logout() {
        sessionStorage.removeItem('isLoggedIn');
        location.reload();
    }

    function checkAutoLogin() { 
        if(sessionStorage.getItem('isLoggedIn') === 'true') showApp(); 
    }

    function showApp() { 
        document.getElementById('loginOverlay').style.display='none'; 
        document.getElementById('app').style.display='block'; 
        initApp(); 
    }

    function initApp() {
        document.getElementById('receiptNoDisplay').innerText = "RBS/2026/" + serial;
        document.getElementById('currDate').valueAsDate = new Date();
        loadDash();
    }

    function updatePriceByClass() {
        const cls = document.getElementById('classSelect').value;
        const pricing = { "Nursery/LKG/UKG": 1800, "Class 1 to 5": 2500, "Class 6 to 8": 3200, "Class 9 & 10": 4500 };
        if(cls && pricing[cls]) {
            document.getElementById('amt').value = pricing[cls];
            doCalc();
        }
    }

    function doCalc() {
        let c = +document.getElementById('cash').value || 0;
        let o = +document.getElementById('online').value || 0;
        document.getElementById('net').value = c + o;
    }

    function performSearch() {
        const query = document.getElementById('searchInput').value;
        fetch(SCRIPT_URL + "?search=" + encodeURIComponent(query))
        .then(res => res.json())
        .then(data => {
            if(data && data.length > 0) {
                const r = data[0];
                document.getElementById('receiptNoDisplay').innerText = r.receiptNo;
                document.getElementById('stuName').value = r.name;
                document.getElementById('amt').value = r.amount;
                document.getElementById('cash').value = r.cash;
                document.getElementById('online').value = r.online;
                document.getElementById('net').value = r.net;
                alert("Data found!");
            } else { alert("Not Found!"); }
        });
    }

    document.getElementById('bookForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const b = document.getElementById('saveBtn'); b.innerText = "Saving...";
        let fd = new FormData(this);
        fd.append('receiptNo', document.getElementById('receiptNoDisplay').innerText);
        fetch(SCRIPT_URL, { method: 'POST', body: fd }).then(() => {
            serial++; localStorage.setItem('rbs_serial', serial);
            location.reload();
        });
    });

    function loadDash() {
        let s = JSON.parse(localStorage.getItem('rbs_stats')) || { cash: 0, online: 0, disc: 0 };
        document.getElementById('dashCash').innerText = "₹" + s.cash;
        document.getElementById('dashOnline').innerText = "₹" + s.online;
        document.getElementById('dashTotal').innerText = "₹" + (s.cash + s.online);
    }
</script>

</body>
</html>
